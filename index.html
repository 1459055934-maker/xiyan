<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希言 · 政治哲学助手</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1c1e24;--bg2:#22252d;--bg3:#292d37;--bg4:#313644;--bg5:#3a3f50;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.16);--border3:rgba(255,255,255,.24);
  --t1:#eef0f4;--t2:#b0b8c8;--t3:#7a8499;--t4:#4e5566;
  --blue:#5b8ef2;--blue2:#7aaaf7;--blue-dim:rgba(91,142,242,.18);--blue-glow:rgba(91,142,242,.28);
  --green:#3ecf82;--green-dim:rgba(62,207,130,.14);
  --red:#f07070;--red-dim:rgba(240,112,112,.14);
  --yellow:#f0c060;--yellow-dim:rgba(240,192,96,.14);
  --purple:#a87ef5;--purple-dim:rgba(168,126,245,.14);
  --r:7px;--r2:10px;--sidebar:340px;--topbar:48px;
}
body{font-family:'IBM Plex Sans','Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(91,142,242,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(91,142,242,.025) 1px,transparent 1px);background-size:48px 48px;}
.topbar{height:var(--topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;flex-shrink:0;z-index:100;position:relative;background:var(--bg2);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,142,242,.2),transparent);}
.logo-wrap{display:flex;align-items:center;gap:10px;padding-right:18px;border-right:1px solid var(--border);margin-right:16px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#3a6ad4,#5b8ef2);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;box-shadow:0 0 14px rgba(91,142,242,.35);flex-shrink:0;}
.logo-name{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.2px;}
.logo-sub{font-size:10.5px;color:var(--t3);padding:2px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;}
.topbar-stats{display:flex;align-items:center;gap:3px;}
.stat{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:5px;font-size:12px;color:var(--t2);font-family:'IBM Plex Mono',monospace;transition:background .15s;cursor:default;}
.stat:hover{background:var(--bg3);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-blue{background:var(--blue);box-shadow:0 0 6px var(--blue);}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pl 2.5s infinite;}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);font-size:12.5px;font-family:inherit;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--t2);}
.btn-ghost:hover{background:var(--bg3);color:var(--t1);}
.btn-soft{background:var(--bg3);color:var(--t1);border:1px solid var(--border2);}
.btn-soft:hover{background:var(--bg4);border-color:var(--border3);}
.btn-primary{background:linear-gradient(135deg,#3a6ad4,#5b8ef2);color:#fff;box-shadow:0 0 14px rgba(91,142,242,.3);}
.btn-primary:hover{box-shadow:0 0 20px rgba(91,142,242,.45);transform:translateY(-1px);}
.btn-blue{background:var(--blue-dim);color:var(--blue2);border:1px solid rgba(91,142,242,.25);}
.btn-blue:hover{background:rgba(91,142,242,.25);}
.workspace{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}
.sidebar{width:var(--sidebar);flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;}
.sidebar-top{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.search-wrap{position:relative;}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none;}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border);border-radius:var(--r);font-size:12.5px;font-family:inherit;color:var(--t1);background:var(--bg3);outline:none;transition:all .2s;}
.search-input:focus{border-color:rgba(91,142,242,.5);background:var(--bg4);box-shadow:0 0 0 2px rgba(91,142,242,.15);}
.search-input::placeholder{color:var(--t4);}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t3);transition:all .15s;}
.chip:hover{border-color:var(--border2);color:var(--t2);}
.chip.on{background:var(--blue-dim);color:var(--blue2);border-color:rgba(91,142,242,.35);}
.list-header{padding:10px 14px 5px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.list-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.list-count{font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;background:var(--bg3);padding:1px 8px;border-radius:20px;border:1px solid var(--border);}
.card-list{flex:1;overflow-y:auto;padding:3px 8px 8px;}
.card-list::-webkit-scrollbar{width:3px;}
.card-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
.card{padding:11px 13px;border-radius:var(--r);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:3px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .2s;}
.card:hover{background:var(--bg3);border-color:var(--border);}
.card:hover::before,.card.open::before{opacity:1;}
.card.open{background:var(--bg3);border-color:var(--border2);}
.card.open::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 0% 50%,rgba(91,142,242,.06) 0%,transparent 65%);}
.era-古典::before{background:var(--yellow);}
.era-近代::before{background:var(--blue);}
.era-现代::before{background:var(--red);}
.era-治理::before{background:var(--green);}
.era-中国::before{background:var(--purple);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:relative;z-index:1;}
.card-name{font-size:13.5px;font-weight:500;line-height:1.3;color:var(--t1);}
.card-who{font-size:11px;color:var(--t3);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
.card-arr{color:var(--t3);font-size:9px;transition:transform .2s;flex-shrink:0;margin-top:3px;}
.card.open .card-arr{transform:rotate(90deg);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;position:relative;z-index:1;}
.tag{font-size:10.5px;padding:2px 7px;border-radius:3px;font-weight:400;}
.tag-古典{background:var(--yellow-dim);color:var(--yellow);}
.tag-近代{background:var(--blue-dim);color:var(--blue2);}
.tag-现代{background:var(--red-dim);color:var(--red);}
.tag-治理{background:var(--green-dim);color:var(--green);}
.tag-中国{background:var(--purple-dim);color:var(--purple);}
.tag-new{background:var(--green-dim);color:var(--green);border:1px solid rgba(62,207,130,.2);}
.tag-gray{background:var(--bg4);color:var(--t2);}
.card-detail{display:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--border2);animation:sd .15s ease;position:relative;z-index:1;}
.card.open .card-detail{display:block;}
@keyframes sd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dr{display:flex;gap:8px;margin-bottom:9px;align-items:flex-start;}
.dl{font-size:10.5px;font-weight:500;color:var(--t3);width:52px;flex-shrink:0;padding-top:1px;font-family:'IBM Plex Mono',monospace;}
.dv{font-size:12.5px;color:var(--t2);line-height:1.6;flex:1;}
.card-actions{display:flex;gap:6px;margin-top:11px;}
.sidebar-foot{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;}
.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:var(--r);font-size:12.5px;font-family:inherit;font-weight:500;cursor:pointer;border:1px dashed var(--border2);background:transparent;color:var(--t3);transition:all .18s;}
.add-btn:hover{border-color:rgba(91,142,242,.45);color:var(--blue2);background:var(--blue-dim);}
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.right-top{height:44px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;background:var(--bg2);}
.model-badge{display:flex;align-items:center;gap:6px;padding:3px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;font-size:11.5px;color:var(--t2);font-family:'IBM Plex Mono',monospace;}
.online-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pl 2.5s infinite;}
.turn-ct{font-size:11px;color:var(--t3);padding:3px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;font-family:'IBM Plex Mono',monospace;}
.quick-bar{padding:7px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);}
.ql{font-size:10px;color:var(--t3);font-weight:500;white-space:nowrap;letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.qchips{display:flex;gap:5px;}
.qchip{padding:4px 11px;border-radius:5px;font-size:11.5px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--t2);transition:all .15s;}
.qchip:hover{border-color:rgba(91,142,242,.4);color:var(--blue2);background:var(--blue-dim);}
.chat-frame{flex:1;overflow:hidden;position:relative;padding:14px;background:var(--bg);}
.chat-frame-inner{width:100%;height:100%;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border2);box-shadow:0 0 0 1px rgba(91,142,242,.08),0 8px 32px rgba(0,0,0,.3);position:relative;}
.chat-frame-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),rgba(91,142,242,.3),transparent);z-index:2;pointer-events:none;border-radius:var(--r2) var(--r2) 0 0;}
.chat-frame-inner iframe{width:100%;height:100%;border:none;display:block;}
.frame-loading{position:absolute;inset:0;background:var(--bg3);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .5s;}
.frame-loading.hidden{opacity:0;pointer-events:none;}
.loader{width:30px;height:30px;border-radius:50%;border:2px solid var(--bg5);border-top-color:var(--blue);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:11.5px;color:var(--t3);font-family:'IBM Plex Mono',monospace;}
.action-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);}
.action-hint{font-size:11.5px;color:var(--t3);flex:1;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border2);box-shadow:0 24px 64px rgba(0,0,0,.5);width:520px;max-width:92vw;max-height:88vh;overflow-y:auto;animation:mu .18s ease;}
@keyframes mu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-size:15px;font-weight:600;color:var(--t1);}
.modal-x{width:28px;height:28px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-x:hover{background:var(--bg4);color:var(--t1);}
.modal-body{padding:16px 20px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px;}
.fr{color:var(--red);margin-left:2px;}
.fi,.fta,.fse{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--t1);background:var(--bg3);outline:none;transition:all .15s;-webkit-appearance:none;}
.fi:focus,.fta:focus,.fse:focus{border-color:rgba(91,142,242,.5);box-shadow:0 0 0 2px rgba(91,142,242,.12);background:var(--bg4);}
.fi::placeholder,.fta::placeholder{color:var(--t4);}
.fta{resize:vertical;min-height:70px;line-height:1.55;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fse option{background:var(--bg3);}
.modal-foot{padding:12px 20px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--t1);border:1px solid var(--border2);padding:8px 18px;border-radius:7px;font-size:12.5px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:ta 2.8s ease forwards;white-space:nowrap;pointer-events:none;font-family:'IBM Plex Mono',monospace;}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;text-align:center;}
.empty-ic{font-size:26px;opacity:.25;}
.empty-tx{font-size:12px;color:var(--t3);line-height:1.7;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-icon">希</div>
    <span class="logo-name">希言</span>
    <span class="logo-sub">政治哲学助手</span>
  </div>
  <div class="topbar-stats">
    <div class="stat"><span class="dot dot-blue"></span><span id="tc">0</span>&nbsp;概念</div>
    <div class="stat"><span class="dot dot-green"></span><span id="dc">0</span>&nbsp;今日</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="exportData()">↓ 导出</button>
    <button class="btn btn-soft" onclick="clearToday()">清空今日</button>
    <button class="btn btn-primary" onclick="openModal()">＋ 新增概念</button>
  </div>
</div>
<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-ic">⌕</span>
        <input class="search-input" id="si" type="text" placeholder="搜索概念、思想家、主张…" oninput="render()">
      </div>
      <div class="chips">
        <button class="chip on" onclick="setF('all',this)">全部</button>
        <button class="chip" onclick="setF('古典',this)">古典</button>
        <button class="chip" onclick="setF('近代',this)">近代</button>
        <button class="chip" onclick="setF('现代',this)">现代</button>
        <button class="chip" onclick="setF('治理',this)">治理实践</button>
        <button class="chip" onclick="setF('中国',this)">中国传统</button>
      </div>
    </div>
    <div class="list-header">
      <span class="list-label">// 知识地图</span>
      <span class="list-count" id="vc">0</span>
    </div>
    <div class="card-list" id="cl"></div>
    <div class="sidebar-foot">
      <button class="add-btn" onclick="openModal()">＋ &nbsp;新增概念条目</button>
    </div>
  </div>
  <div class="right">
    <div class="right-top">
      <div class="model-badge"><span class="online-dot"></span>Gemini · 2.5 Flash</div>
      <div class="turn-ct">session · active</div>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="window.open('https://udify.app/chat/lD4r1x7e6vFSEpZ9','_blank')">↗ 独立窗口</button>
    </div>
    <div class="quick-bar">
      <span class="ql">// prompt</span>
      <div class="qchips">
        <button class="qchip" onclick="copyQ('请帮我分析以下文本，从政治哲学视角给出结构性解读：\n\n')">分析文本</button>
        <button class="qchip" onclick="copyQ('我有一个判断，请检验其理论支撑并找出反驳视角：\n\n')">检验观点</button>
        <button class="qchip" onclick="copyQ('我面临以下工作决策困境，请给出结构性分析与现实指向：\n\n')">决策研判</button>
        <button class="qchip" onclick="copyQ('请解释以下概念并指出其对立张力与当代应用：\n\n')">查询概念</button>
      </div>
    </div>
    <div class="chat-frame">
      <div class="chat-frame-inner">
        <div class="frame-loading" id="fl">
          <div class="loader"></div>
          <div class="loader-text">connecting to 希言…</div>
        </div>
        <iframe id="dify" src="https://udify.app/chatbot/lD4r1x7e6vFSEpZ9" allow="microphone" title="希言对话" onload="document.getElementById('fl').classList.add('hidden')"></iframe>
      </div>
    </div>
    <div class="action-bar">
      <span class="action-hint">// 对话结束后，将 AI 提炼的知识条目存入左侧知识库</span>
      <button class="btn btn-soft" onclick="openModal()">＋ 提炼条目</button>
      <button class="btn btn-blue" onclick="window.open('https://udify.app/chat/lD4r1x7e6vFSEpZ9','_blank')">↗ 独立对话</button>
    </div>
  </div>
</div>
<div class="overlay" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="mt">新增概念条目</span>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ei" value="-1">
      <div class="frow">
        <div class="fg"><label class="fl">概念名称<span class="fr">*</span></label><input class="fi" id="fn" placeholder="如：社会契约"></div>
        <div class="fg"><label class="fl">思想家</label><input class="fi" id="fk" placeholder="如：卢梭、霍布斯"></div>
      </div>
      <div class="fg"><label class="fl">核心主张<span class="fr">*</span></label><input class="fi" id="fc" placeholder="一句话概括核心论点"></div>
      <div class="fg"><label class="fl">对立关系</label><input class="fi" id="ften" placeholder="如：↔ 施米特决断论"></div>
      <div class="frow">
        <div class="fg"><label class="fl">时代分类</label><select class="fse" id="fe"><option value="">未分类</option><option value="古典">古典</option><option value="近代">近代</option><option value="现代">现代</option><option value="治理">治理实践</option><option value="中国">中国传统</option></select></div>
        <div class="fg"><label class="fl">应用场景</label><input class="fi" id="fs" placeholder="如：政策执行分析"></div>
      </div>
      <div class="fg"><label class="fl">触发问题</label><input class="fi" id="fq" placeholder="是什么问题引出了这个概念？"></div>
      <div class="fg"><label class="fl">我的观点</label><textarea class="fta" id="fo" placeholder="你对这个概念的个人判断…" rows="3"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="save()">保存条目</button>
    </div>
  </div>
</div>
<script>
const SK='xiyan_v5';
let data=[],fil='all',expIdx=-1;
function load(){try{data=JSON.parse(localStorage.getItem(SK)||'null')||def();}catch{data=def();}}
function persist(){localStorage.setItem(SK,JSON.stringify(data));stats();}
function def(){return[
  {name:'社会契约',who:'卢梭、霍布斯、洛克',claim:'个人让渡部分权利给公共权威，以换取秩序与保护',tension:'↔ 施米特决断论（契约理性 vs 例外状态）',era:'近代',scene:'基层治理合法性分析、政策执行阻力研判',trigger:'',opinion:'',date:td(),isNew:false},
  {name:'科层制',who:'韦伯',claim:'以规则、层级、专业分工为基础的理性化组织形式',tension:'↔ 魅力型权威（制度理性 vs 个人权威）',era:'现代',scene:'机构改革、部门协调失灵、执行力分析',trigger:'',opinion:'',date:td(),isNew:false},
  {name:'委托代理',who:'政治经济学传统',claim:'上级委托下级执行，信息不对称导致目标偏离',tension:'↔ 整体性治理（碎片化 vs 协同）',era:'治理',scene:'政策落地走样、考核指标异化',trigger:'基层政府表面合规、实质变形',opinion:'',date:td(),isNew:false}
];}
function td(){return new Date().toLocaleDateString('zh-CN');}
function render(){
  const q=document.getElementById('si').value.toLowerCase();
  const fl=data.filter(c=>{
    const mf=fil==='all'||c.era===fil;
    const ms=!q||[c.name,c.who,c.claim,c.scene].some(s=>(s||'').toLowerCase().includes(q));
    return mf&&ms;
  });
  document.getElementById('vc').textContent=fl.length;
  const el=document.getElementById('cl');
  if(!fl.length){el.innerHTML='<div class="empty"><div class="empty-ic">◈</div><div class="empty-tx">// no results<br>点击下方按钮新增概念</div></div>';return;}
  el.innerHTML=fl.map(c=>{
    const ri=data.indexOf(c),op=expIdx===ri,ec=c.era?'era-'+c.era:'';
    return'<div class="card '+(op?'open ':'')+ec+'" onclick="tog('+ri+')">'+
      '<div class="card-head"><div><div class="card-name">'+c.name+'</div><div class="card-who">'+(c.who||'—')+'</div></div><span class="card-arr">▶</span></div>'+
      '<div class="card-tags">'+(c.era?'<span class="tag tag-'+c.era+'">'+c.era+'</span>':'')+(c.isNew?'<span class="tag tag-new">↑ 今日新增</span>':'')+(c.scene?'<span class="tag tag-gray">'+c.scene.split('、')[0]+'</span>':'')+'</div>'+
      '<div class="card-detail">'+row('主张',c.claim)+row('张力',c.tension)+row('触发',c.trigger)+row('场景',c.scene)+row('观点',c.opinion)+
      '<div class="dr"><span class="dl">日期</span><span class="dv" style="color:var(--t3);font-size:11.5px">'+c.date+'</span></div>'+
      '<div class="card-actions"><button class="btn btn-soft" style="font-size:11px;padding:3px 9px" onclick="edit(event,'+ri+')">编辑</button><button class="btn btn-ghost" style="font-size:11px;padding:3px 9px;color:var(--red)" onclick="del(event,'+ri+')">删除</button></div>'+
      '</div></div>';
  }).join('');
}
function row(l,v){return v?'<div class="dr"><span class="dl">'+l+'</span><span class="dv">'+v+'</span></div>':'';}
function tog(i){expIdx=expIdx===i?-1:i;render();}
function setF(v,el){fil=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}
function stats(){document.getElementById('tc').textContent=data.length;document.getElementById('dc').textContent=data.filter(c=>c.isNew).length;}
function openModal(){clrForm();document.getElementById('ei').value=-1;document.getElementById('mt').textContent='新增概念条目';document.getElementById('ov').classList.add('on');setTimeout(()=>document.getElementById('fn').focus(),100);}
function edit(e,i){e.stopPropagation();const c=data[i];document.getElementById('ei').value=i;document.getElementById('mt').textContent='编辑条目';document.getElementById('fn').value=c.name||'';document.getElementById('fk').value=c.who||'';document.getElementById('fc').value=c.claim||'';document.getElementById('ften').value=c.tension||'';document.getElementById('fe').value=c.era||'';document.getElementById('fs').value=c.scene||'';document.getElementById('fq').value=c.trigger||'';document.getElementById('fo').value=c.opinion||'';document.getElementById('ov').classList.add('on');}
function closeModal(){document.getElementById('ov').classList.remove('on');}
function closeBg(e){if(e.target===document.getElementById('ov'))closeModal();}
function clrForm(){['fn','fk','fc','ften','fs','fq','fo'].forEach(id=>document.getElementById(id).value='');document.getElementById('fe').value='';}
function save(){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('// 请填写概念名称');return;}
  const c={name,who:document.getElementById('fk').value.trim(),claim:document.getElementById('fc').value.trim(),tension:document.getElementById('ften').value.trim(),era:document.getElementById('fe').value,scene:document.getElementById('fs').value.trim(),trigger:document.getElementById('fq').value.trim(),opinion:document.getElementById('fo').value.trim(),date:td(),isNew:true};
  const idx=parseInt(document.getElementById('ei').value);
  if(idx>=0){c.isNew=data[idx].isNew;c.date=data[idx].date;data[idx]=c;toast('// updated');}
  else{data.unshift(c);toast('// saved');}
  persist();render();closeModal();
}
function del(e,i){e.stopPropagation();if(!confirm('删除「'+data[i].name+'」？'))return;data.splice(i,1);if(expIdx===i)expIdx=-1;persist();render();toast('// deleted');}
function copyQ(t){navigator.clipboard.writeText(t).then(()=>toast('// copied → paste into chat')).catch(()=>toast('请手动输入'));}
function clearToday(){data.forEach(c=>c.isNew=false);persist();render();toast('// cleared');}
function exportData(){
  const tx=data.map(c=>['# '+c.name,'思想家：'+(c.who||'—'),'核心主张：'+(c.claim||'—'),'对立关系：'+(c.tension||'—'),'时代：'+(c.era||'—'),'应用场景：'+(c.scene||'—'),c.trigger?'触发问题：'+c.trigger:'',c.opinion?'我的观点：'+c.opinion:'','录入日期：'+c.date].filter(Boolean).join('\n')).join('\n\n---\n\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([tx],{type:'text/plain;charset=utf-8'}));a.download='希言_'+td()+'.txt';a.click();toast('// exported');
}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2900);}
load();render();stats();
</script>
</body>
</html>
