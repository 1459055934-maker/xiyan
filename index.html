<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希言 · 政治哲学助手</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:       #ffffff;
  --bg2:      #f8f9fb;
  --bg3:      #f2f4f7;
  --bg4:      #eaecf0;
  --bg5:      #e0e3e8;
  --border:   #e8eaed;
  --border2:  #d4d8de;
  --border3:  #bec3cb;
  --t1:       #111318;
  --t2:       #555e6e;
  --t3:       #8892a0;
  --t4:       #b0b8c4;
  --blue:     #2563eb;
  --blue2:    #3b7af0;
  --blue3:    #6096f5;
  --blue-bg:  #eff4ff;
  --blue-mid: #dbeafe;
  --blue-bdr: rgba(37,99,235,.2);
  --green:    #059669;
  --green-bg: #ecfdf5;
  --green-bdr:rgba(5,150,105,.2);
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --yellow:   #d97706;
  --yellow-bg:#fffbeb;
  --purple:   #7c3aed;
  --purple-bg:#f5f3ff;
  --amber:    #b45309;
  --sidebar:  368px;
  --topbar:   52px;
  --r:        8px;
  --r2:       12px;
  --sh1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
  --sh3: 0 8px 28px rgba(0,0,0,.09), 0 4px 8px rgba(0,0,0,.05);
  --sh4: 0 20px 60px rgba(0,0,0,.12), 0 8px 20px rgba(0,0,0,.06);
}

body{
  font-family:'DM Sans','Noto Sans SC',sans-serif;
  background:var(--bg2);color:var(--t1);
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
  font-size:14px;-webkit-font-smoothing:antialiased;
}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;
  flex-shrink:0;z-index:100;position:relative;
  box-shadow:var(--sh1);
}
/* blue accent line */
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue) 0%,var(--blue3) 40%,transparent 100%);
  opacity:.7;
}

.logo-wrap{
  display:flex;align-items:center;gap:10px;
  padding-right:20px;border-right:1px solid var(--border);margin-right:18px;
}
.logo-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:700;
  box-shadow:0 2px 8px rgba(37,99,235,.3);flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.3px;}
.logo-sub{
  font-size:10.5px;color:var(--t3);padding:2px 8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;letter-spacing:.03em;font-weight:400;
}

.topbar-stats{display:flex;align-items:center;gap:3px;}
.stat{
  display:flex;align-items:center;gap:6px;
  padding:4px 11px;border-radius:20px;
  font-size:12.5px;color:var(--t2);cursor:default;
  transition:background .15s;font-weight:400;
}
.stat:hover{background:var(--bg3);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-blue{background:var(--blue);box-shadow:0 0 0 2px var(--blue-mid);}
.dot-green{background:var(--green);box-shadow:0 0 0 2px var(--green-bg);animation:pl 2.5s infinite;}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;}

.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:var(--r);
  font-size:13px;font-family:inherit;font-weight:500;
  cursor:pointer;border:none;transition:all .15s;white-space:nowrap;
}
.btn-ghost{background:transparent;color:var(--t2);}
.btn-ghost:hover{background:var(--bg3);color:var(--t1);}
.btn-soft{background:var(--bg);color:var(--t1);border:1px solid var(--border2);box-shadow:var(--sh1);}
.btn-soft:hover{background:var(--bg3);border-color:var(--border3);}
.btn-primary{
  background:var(--blue);color:#fff;
  box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.btn-primary:hover{background:var(--blue2);box-shadow:0 4px 14px rgba(37,99,235,.38);transform:translateY(-1px);}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr);}
.btn-blue:hover{background:var(--blue-mid);}

/* ── LAYOUT ── */
.workspace{display:flex;flex:1;overflow:hidden;padding:0;gap:0;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
  border-right:1px solid var(--border);
  box-shadow:2px 0 8px rgba(0,0,0,.04);
  z-index:10;
}

.sidebar-top{
  padding:12px 13px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:9px;flex-shrink:0;
  background:var(--bg);
}

.search-wrap{position:relative;}
.search-ic{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--t3);font-size:14px;pointer-events:none;
}
.search-input{
  width:100%;padding:8px 10px 8px 33px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-size:13px;font-family:inherit;color:var(--t1);
  background:var(--bg2);outline:none;transition:all .2s;
}
.search-input:focus{
  border-color:var(--blue);background:var(--bg);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.search-input::placeholder{color:var(--t4);}

.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{
  padding:4px 11px;border-radius:20px;
  font-size:12px;font-family:inherit;font-weight:400;
  cursor:pointer;border:1.5px solid var(--border);
  background:var(--bg);color:var(--t2);transition:all .15s;
}
.chip:hover{border-color:var(--border3);color:var(--t1);background:var(--bg2);}
.chip.on{
  background:var(--blue);color:#fff;border-color:var(--blue);
  box-shadow:0 2px 6px rgba(37,99,235,.25);
}

/* list header */
.list-header{
  padding:12px 15px 5px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.list-label{
  font-size:10.5px;font-weight:600;color:var(--t3);
  letter-spacing:.1em;text-transform:uppercase;
}
.list-count{
  font-size:11.5px;color:var(--t3);
  background:var(--bg3);padding:2px 9px;
  border-radius:20px;border:1px solid var(--border);font-weight:500;
}

/* cards */
.card-list{flex:1;overflow-y:auto;padding:4px 10px 10px;}
.card-list::-webkit-scrollbar{width:3px;}
.card-list::-webkit-scrollbar-track{background:transparent;}
.card-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}

.card{
  padding:12px 14px 12px 17px;
  border-radius:var(--r);
  cursor:pointer;transition:all .18s;
  border:1.5px solid transparent;
  margin-bottom:4px;
  position:relative;overflow:hidden;
  background:var(--bg);
}
/* left accent bar */
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;
  border-radius:4px 0 0 4px;opacity:0;transition:opacity .2s;
}
.card:hover{
  background:var(--bg2);border-color:var(--border2);
  box-shadow:var(--sh1);transform:translateX(2px);
}
.card:hover::before{opacity:1;}
.card.open{
  background:var(--bg);border-color:var(--border2);
  box-shadow:var(--sh2);
}
.card.open::before{opacity:1;}

.era-古典::before{background:var(--yellow);}
.era-近代::before{background:var(--blue);}
.era-现代::before{background:var(--red);}
.era-治理::before{background:var(--green);}
.era-中国::before{background:var(--purple);}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-name{font-size:14px;font-weight:600;line-height:1.3;color:var(--t1);}
.card-who{font-size:11.5px;color:var(--t3);margin-top:3px;font-family:'DM Mono',monospace;}
.card-arr{
  color:var(--t3);font-size:10px;transition:transform .2s;
  flex-shrink:0;margin-top:3px;
}
.card.open .card-arr{transform:rotate(90deg);color:var(--blue);}

.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px;}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.tag-古典{background:var(--yellow-bg);color:var(--yellow);}
.tag-近代{background:var(--blue-bg);color:var(--blue);}
.tag-现代{background:var(--red-bg);color:var(--red);}
.tag-治理{background:var(--green-bg);color:var(--green);}
.tag-中国{background:var(--purple-bg);color:var(--purple);}
.tag-new{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr);}
.tag-gray{background:var(--bg3);color:var(--t2);border:1px solid var(--border);}

.card-detail{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid var(--border);
  animation:sd .16s ease;
}
.card.open .card-detail{display:block;}
@keyframes sd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.dr{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.dl{
  font-size:11px;font-weight:600;color:var(--t3);
  width:46px;flex-shrink:0;padding-top:2px;
  letter-spacing:.03em;text-transform:uppercase;
}
.dv{font-size:13px;color:var(--t2);line-height:1.6;flex:1;}

.card-actions{display:flex;gap:7px;margin-top:12px;}

/* sidebar footer */
.sidebar-foot{
  padding:12px 13px;border-top:1px solid var(--border);flex-shrink:0;
  background:var(--bg2);
}
.add-btn{
  width:100%;display:flex;align-items:center;justify-content:center;
  gap:7px;padding:9px;border-radius:var(--r);
  font-size:13px;font-family:inherit;font-weight:500;
  cursor:pointer;border:1.5px dashed var(--border2);
  background:var(--bg);color:var(--t2);transition:all .18s;
}
.add-btn:hover{
  border-color:var(--blue);color:var(--blue);
  background:var(--blue-bg);box-shadow:0 2px 8px rgba(37,99,235,.12);
}

/* ── RIGHT PANEL ── */
.right{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg2);
}

.right-top{
  height:46px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:8px;
  flex-shrink:0;background:var(--bg);
  box-shadow:var(--sh1);
}
.model-badge{
  display:flex;align-items:center;gap:7px;
  padding:4px 12px;background:var(--bg2);
  border:1.5px solid var(--border2);border-radius:20px;
  font-size:12px;color:var(--t2);font-family:'DM Mono',monospace;
}
.online-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 2px var(--green-bg);
  animation:pl 2.5s infinite;
}
.session-badge{
  font-size:12px;color:var(--t3);padding:4px 11px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;font-family:'DM Mono',monospace;
}

/* quick bar */
.quick-bar{
  padding:9px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  background:var(--bg);
}
.ql{
  font-size:10.5px;color:var(--t3);font-weight:600;white-space:nowrap;
  letter-spacing:.08em;text-transform:uppercase;
}
.qchips{display:flex;gap:6px;flex-wrap:wrap;}
.qchip{
  padding:5px 13px;border-radius:20px;
  font-size:12px;font-family:inherit;font-weight:400;
  cursor:pointer;border:1.5px solid var(--border2);
  background:var(--bg);color:var(--t2);transition:all .15s;
}
.qchip:hover{
  border-color:var(--blue);color:var(--blue);
  background:var(--blue-bg);
}

/* chat container */
.chat-container{
  flex:1;padding:16px;overflow:hidden;
  display:flex;flex-direction:column;
}

.iframe-shell{
  flex:1;border-radius:var(--r2);overflow:hidden;
  border:1.5px solid var(--border2);
  box-shadow:var(--sh3);
  background:#fff;position:relative;
}

/* browser chrome */
.browser-bar{
  height:36px;background:linear-gradient(180deg,#f5f5f5 0%,#ececec 100%);
  border-bottom:1px solid #e0e0e0;
  display:flex;align-items:center;padding:0 14px;gap:6px;
  flex-shrink:0;
}
.browser-dots{display:flex;gap:5px;align-items:center;}
.bdot{width:10px;height:10px;border-radius:50%;}
.bdot-r{background:#ff5f57;}
.bdot-y{background:#ffbd2e;}
.bdot-g{background:#28c840;}
.browser-url{
  flex:1;margin:0 10px;
  background:#fff;border:1px solid #ddd;
  border-radius:5px;padding:3px 10px;
  font-size:11.5px;color:#888;font-family:'DM Mono',monospace;
  white-space:nowrap;overflow:hidden;
}

.iframe-shell iframe{
  width:100%;
  height:calc(100% - 36px);
  border:none;display:block;
}

/* loading */
.frame-loading{
  position:absolute;inset:36px 0 0 0;
  background:#fafafa;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  z-index:20;transition:opacity .5s;
}
.frame-loading.gone{opacity:0;pointer-events:none;}
.loader{
  width:32px;height:32px;border-radius:50%;
  border:2.5px solid var(--bg4);border-top-color:var(--blue);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:12.5px;color:var(--t3);font-family:'DM Mono',monospace;}

/* action bar */
.action-bar{
  padding:9px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;background:var(--bg);
}
.action-hint{font-size:12px;color:var(--t3);flex:1;}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(17,19,24,.45);
  backdrop-filter:blur(8px);
  z-index:1000;display:none;
  align-items:center;justify-content:center;
}
.overlay.on{display:flex;}

.modal{
  background:var(--bg);border-radius:var(--r2);
  border:1px solid var(--border2);
  box-shadow:var(--sh4);
  width:520px;max-width:92vw;max-height:88vh;
  overflow-y:auto;animation:mu .18s ease;
}
@keyframes mu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.modal-head{
  padding:20px 22px 15px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);}
.modal-x{
  width:28px;height:28px;border-radius:6px;border:none;
  background:transparent;cursor:pointer;color:var(--t3);
  font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.modal-x:hover{background:var(--bg3);color:var(--t1);}

.modal-body{padding:18px 22px;}
.fg{margin-bottom:15px;}
.fl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:.02em;}
.fr{color:var(--red);margin-left:2px;}
.fi,.fta,.fse{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-size:13.5px;font-family:inherit;color:var(--t1);
  background:var(--bg);outline:none;transition:all .15s;
  -webkit-appearance:none;
}
.fi:focus,.fta:focus,.fse:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.fi::placeholder,.fta::placeholder{color:var(--t4);}
.fta{resize:vertical;min-height:72px;line-height:1.6;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px;}

.modal-foot{
  padding:14px 22px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;
  position:sticky;bottom:0;background:var(--bg);
}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--t1);color:#fff;
  padding:9px 18px;border-radius:8px;
  font-size:13px;z-index:9999;
  box-shadow:var(--sh3);
  animation:ta 2.9s ease forwards;white-space:nowrap;pointer-events:none;
}
@keyframes ta{
  0%{opacity:0;transform:translateX(-50%) translateY(8px)}
  12%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}100%{opacity:0}
}

.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:44px 20px;gap:10px;text-align:center;
}
.empty-ic{font-size:28px;opacity:.25;}
.empty-tx{font-size:12.5px;color:var(--t3);line-height:1.7;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-icon">希</div>
    <span class="logo-name">希言</span>
    <span class="logo-sub">政治哲学助手</span>
  </div>
  <div class="topbar-stats">
    <div class="stat"><span class="dot dot-blue"></span><span id="tc">0</span> 个概念</div>
    <div class="stat"><span class="dot dot-green"></span><span id="dc">0</span> 今日新增</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="exportData()">↓ 导出</button>
    <button class="btn btn-soft" onclick="clearToday()">清空今日标记</button>
    <button class="btn btn-primary" onclick="openModal()">＋ 新增概念</button>
  </div>
</div>

<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-ic">⌕</span>
        <input class="search-input" id="si" type="text"
          placeholder="搜索概念、思想家、主张…" oninput="render()">
      </div>
      <div class="chips">
        <button class="chip on" onclick="setF('all',this)">全部</button>
        <button class="chip" onclick="setF('古典',this)">古典</button>
        <button class="chip" onclick="setF('近代',this)">近代</button>
        <button class="chip" onclick="setF('现代',this)">现代</button>
        <button class="chip" onclick="setF('治理',this)">治理实践</button>
        <button class="chip" onclick="setF('中国',this)">中国传统</button>
      </div>
    </div>

    <div class="list-header">
      <span class="list-label">知识地图</span>
      <span class="list-count" id="vc">0</span>
    </div>

    <div class="card-list" id="cl"></div>

    <div class="sidebar-foot">
      <button class="add-btn" onclick="openModal()">＋ &nbsp;新增概念条目</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-top">
      <div class="model-badge">
        <span class="online-dot"></span>
        Gemini · 2.5 Flash
      </div>
      <div class="session-badge" id="turnc">对话进行中</div>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="window.open('https://udify.app/chat/lD4r1x7e6vFSEpZ9','_blank')">↗ 独立窗口</button>
    </div>

    <div class="quick-bar">
      <span class="ql">快捷指令</span>
      <div class="qchips">
        <button class="qchip" onclick="copyQ('请帮我分析以下文本，从政治哲学视角给出结构性解读：\n\n')">📄 分析文本</button>
        <button class="qchip" onclick="copyQ('我有一个判断，请检验其理论支撑并找出反驳视角：\n\n')">🔎 检验观点</button>
        <button class="qchip" onclick="copyQ('我面临以下工作决策困境，请给出结构性分析与现实指向：\n\n')">⚖️ 决策研判</button>
        <button class="qchip" onclick="copyQ('请解释以下概念并指出其对立张力与当代应用：\n\n')">📖 查询概念</button>
      </div>
    </div>

    <div class="chat-container">
      <div class="iframe-shell">
        <div class="browser-bar">
          <div class="browser-dots">
            <div class="bdot bdot-r"></div>
            <div class="bdot bdot-y"></div>
            <div class="bdot bdot-g"></div>
          </div>
          <div class="browser-url">希言 · 政治哲学对话助手</div>
        </div>
        <div class="frame-loading" id="fl">
          <div class="loader"></div>
          <div class="loader-text">正在连接希言…</div>
        </div>
        <iframe
          id="dify"
          src="https://udify.app/chatbot/lD4r1x7e6vFSEpZ9"
          allow="microphone"
          title="希言对话"
          onload="document.getElementById('fl').classList.add('gone')"
        ></iframe>
      </div>
    </div>

    <div class="action-bar">
      <span class="action-hint">💡 对话结束后，将 AI 提炼的知识条目存入左侧知识库，持续沉淀</span>
      <button class="btn btn-soft" onclick="openModal()">＋ 提炼条目</button>
      <button class="btn btn-blue" onclick="window.open('https://udify.app/chat/lD4r1x7e6vFSEpZ9','_blank')">↗ 独立对话</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="mt">新增概念条目</span>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ei" value="-1">
      <div class="frow">
        <div class="fg">
          <label class="fl">概念名称<span class="fr">*</span></label>
          <input class="fi" id="fn" placeholder="如：社会契约">
        </div>
        <div class="fg">
          <label class="fl">思想家</label>
          <input class="fi" id="fk" placeholder="如：卢梭、霍布斯">
        </div>
      </div>
      <div class="fg">
        <label class="fl">核心主张<span class="fr">*</span></label>
        <input class="fi" id="fc" placeholder="一句话概括核心论点">
      </div>
      <div class="fg">
        <label class="fl">对立关系</label>
        <input class="fi" id="ften" placeholder="如：↔ 施米特决断论（契约理性 vs 例外状态）">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl">时代分类</label>
          <select class="fse" id="fe">
            <option value="">未分类</option>
            <option value="古典">古典</option>
            <option value="近代">近代</option>
            <option value="现代">现代</option>
            <option value="治理">治理实践</option>
            <option value="中国">中国传统</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">应用场景</label>
          <input class="fi" id="fs" placeholder="如：政策执行分析">
        </div>
      </div>
      <div class="fg">
        <label class="fl">触发问题</label>
        <input class="fi" id="fq" placeholder="是什么问题引出了这个概念？">
      </div>
      <div class="fg">
        <label class="fl">我的观点</label>
        <textarea class="fta" id="fo" placeholder="你对这个概念的个人判断与延伸思考…" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="save()">保存条目</button>
    </div>
  </div>
</div>

<script>
const SK='xiyan_v6';
const CHAT='https://udify.app/chat/lD4r1x7e6vFSEpZ9';
let data=[],fil='all',expIdx=-1;

function load(){try{data=JSON.parse(localStorage.getItem(SK)||'null')||def();}catch{data=def();}}
function persist(){localStorage.setItem(SK,JSON.stringify(data));stats();}

function def(){return[
  {name:'社会契约',who:'卢梭、霍布斯、洛克',claim:'个人让渡部分权利给公共权威，以换取秩序与保护',tension:'↔ 施米特决断论（契约理性 vs 例外状态）',era:'近代',scene:'基层治理合法性分析、政策执行阻力研判',trigger:'',opinion:'',date:td(),isNew:false},
  {name:'科层制',who:'韦伯',claim:'以规则、层级、专业分工为基础的理性化组织形式',tension:'↔ 魅力型权威（制度理性 vs 个人权威）',era:'现代',scene:'机构改革、部门协调失灵、执行力分析',trigger:'',opinion:'',date:td(),isNew:false},
  {name:'委托代理',who:'政治经济学传统',claim:'上级委托下级执行，信息不对称导致目标偏离',tension:'↔ 整体性治理（碎片化 vs 协同）',era:'治理',scene:'政策落地走样、考核指标异化',trigger:'基层政府表面合规、实质变形',opinion:'',date:td(),isNew:false}
];}
function td(){return new Date().toLocaleDateString('zh-CN');}

function render(){
  const q=document.getElementById('si').value.toLowerCase();
  const fl=data.filter(c=>{
    const mf=fil==='all'||c.era===fil;
    const ms=!q||[c.name,c.who,c.claim,c.scene].some(s=>(s||'').toLowerCase().includes(q));
    return mf&&ms;
  });
  document.getElementById('vc').textContent=fl.length;
  const el=document.getElementById('cl');
  if(!fl.length){
    el.innerHTML=`<div class="empty"><div class="empty-ic">◈</div><div class="empty-tx">暂无匹配条目<br>点击下方按钮新增概念</div></div>`;
    return;
  }
  el.innerHTML=fl.map(c=>{
    const ri=data.indexOf(c),op=expIdx===ri;
    const ec=c.era?`era-${c.era}`:'';
    return`<div class="card ${op?'open':''} ${ec}" onclick="tog(${ri})">
      <div class="card-head">
        <div><div class="card-name">${c.name}</div><div class="card-who">${c.who||'—'}</div></div>
        <span class="card-arr">▶</span>
      </div>
      <div class="card-tags">
        ${c.era?`<span class="tag tag-${c.era}">${c.era}</span>`:''}
        ${c.isNew?'<span class="tag tag-new">↑ 今日新增</span>':''}
        ${c.scene?`<span class="tag tag-gray">${c.scene.split('、')[0]}</span>`:''}
      </div>
      <div class="card-detail">
        ${row('主张',c.claim)}${row('张力',c.tension)}${row('触发',c.trigger)}${row('场景',c.scene)}${row('观点',c.opinion)}
        <div class="dr"><span class="dl">日期</span><span class="dv" style="color:var(--t3);font-size:12px">${c.date}</span></div>
        <div class="card-actions">
          <button class="btn btn-soft" style="font-size:12px;padding:4px 10px" onclick="edit(event,${ri})">编辑</button>
          <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px;color:var(--red)" onclick="del(event,${ri})">删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function row(l,v){return v?`<div class="dr"><span class="dl">${l}</span><span class="dv">${v}</span></div>`:'';}
function tog(i){expIdx=expIdx===i?-1:i;render();}
function setF(v,el){fil=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}
function stats(){document.getElementById('tc').textContent=data.length;document.getElementById('dc').textContent=data.filter(c=>c.isNew).length;}

function openModal(pre){
  clrForm();document.getElementById('ei').value=-1;
  document.getElementById('mt').textContent='新增概念条目';
  if(pre){document.getElementById('fn').value=pre.name||'';document.getElementById('fc').value=pre.claim||'';}
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('fn').focus(),100);
}
function edit(e,i){
  e.stopPropagation();const c=data[i];
  document.getElementById('ei').value=i;
  document.getElementById('mt').textContent='编辑条目';
  document.getElementById('fn').value=c.name||'';
  document.getElementById('fk').value=c.who||'';
  document.getElementById('fc').value=c.claim||'';
  document.getElementById('ften').value=c.tension||'';
  document.getElementById('fe').value=c.era||'';
  document.getElementById('fs').value=c.scene||'';
  document.getElementById('fq').value=c.trigger||'';
  document.getElementById('fo').value=c.opinion||'';
  document.getElementById('ov').classList.add('on');
}
function closeModal(){document.getElementById('ov').classList.remove('on');}
function closeBg(e){if(e.target===document.getElementById('ov'))closeModal();}
function clrForm(){['fn','fk','fc','ften','fs','fq','fo'].forEach(id=>document.getElementById(id).value='');document.getElementById('fe').value='';}

function save(){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('请填写概念名称');return;}
  const c={
    name,who:document.getElementById('fk').value.trim(),
    claim:document.getElementById('fc').value.trim(),
    tension:document.getElementById('ften').value.trim(),
    era:document.getElementById('fe').value,
    scene:document.getElementById('fs').value.trim(),
    trigger:document.getElementById('fq').value.trim(),
    opinion:document.getElementById('fo').value.trim(),
    date:td(),isNew:true
  };
  const idx=parseInt(document.getElementById('ei').value);
  if(idx>=0){c.isNew=data[idx].isNew;c.date=data[idx].date;data[idx]=c;toast('✓ 概念已更新');}
  else{data.unshift(c);toast('✓ 已存入知识库');}
  persist();render();closeModal();
}
function del(e,i){
  e.stopPropagation();
  if(!confirm(`删除「${data[i].name}」？`))return;
  data.splice(i,1);if(expIdx===i)expIdx=-1;
  persist();render();toast('已删除');
}
function copyQ(t){
  navigator.clipboard.writeText(t).then(()=>toast('✓ 已复制 → 请粘贴到对话框')).catch(()=>toast('请手动输入到对话框'));
}
function clearToday(){data.forEach(c=>c.isNew=false);persist();render();toast('今日标记已清除');}
function exportData(){
  const tx=data.map(c=>[`# ${c.name}`,`思想家：${c.who||'—'}`,`核心主张：${c.claim||'—'}`,`对立关系：${c.tension||'—'}`,`时代：${c.era||'—'}`,`应用场景：${c.scene||'—'}`,c.trigger?`触发问题：${c.trigger}`:'',c.opinion?`我的观点：${c.opinion}`:'',`录入日期：${c.date}`].filter(Boolean).join('\n')).join('\n\n---\n\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([tx],{type:'text/plain;charset=utf-8'}));
  a.download=`希言知识地图_${td()}.txt`;a.click();toast('✓ 导出成功');
}
function toast(m){
  const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

load();render();stats();
</script>
</body>
</html>
