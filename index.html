<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希言 · 政治哲学助手</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f8f9fb;--bg3:#f2f4f7;--bg4:#eaecf0;--bg5:#e0e3e8;
  --border:#e8eaed;--border2:#d4d8de;--border3:#bec3cb;
  --t1:#111318;--t2:#555e6e;--t3:#8892a0;--t4:#b0b8c4;
  --blue:#2563eb;--blue2:#3b7af0;--blue3:#6096f5;
  --blue-bg:#eff4ff;--blue-mid:#dbeafe;--blue-bdr:rgba(37,99,235,.2);
  --green:#059669;--green-bg:#ecfdf5;
  --red:#dc2626;--red-bg:#fef2f2;
  --yellow:#d97706;--yellow-bg:#fffbeb;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --sh1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
  --sh3:0 8px 28px rgba(0,0,0,.09),0 4px 8px rgba(0,0,0,.05);
  --sh4:0 20px 60px rgba(0,0,0,.12),0 8px 20px rgba(0,0,0,.06);
  --r:8px;--r2:12px;
}
body{font-family:'DM Sans','Noto Sans SC',sans-serif;background:var(--bg2);color:var(--t1);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px;-webkit-font-smoothing:antialiased}

/* AUTH SCREEN */
.auth-screen{
  position:fixed;inset:0;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.auth-card{
  background:var(--bg);border-radius:var(--r2);
  border:1px solid var(--border2);box-shadow:var(--sh4);
  width:400px;padding:36px 36px 32px;
}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-icon{
  width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.auth-title{font-size:20px;font-weight:700;color:var(--t1);}
.auth-sub{font-size:13px;color:var(--t3);margin-top:2px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.auth-tab{flex:1;padding:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:all .15s;}
.auth-tab.on{background:var(--blue);color:#fff;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;}
.form-input{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);
  border-radius:var(--r);font-size:13.5px;font-family:inherit;
  color:var(--t1);background:var(--bg);outline:none;transition:all .15s;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.form-input::placeholder{color:var(--t4);}
.auth-btn{
  width:100%;padding:10px;border-radius:var(--r);
  font-size:14px;font-family:inherit;font-weight:600;
  cursor:pointer;border:none;background:var(--blue);
  color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);
  transition:all .15s;margin-top:4px;
}
.auth-btn:hover{background:var(--blue2);transform:translateY(-1px);}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-err{font-size:12.5px;color:var(--red);margin-top:8px;text-align:center;}
.auth-ok{font-size:12.5px;color:var(--green);margin-top:8px;text-align:center;}

/* TOPBAR */
.topbar{
  height:52px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;flex-shrink:0;z-index:100;
  box-shadow:var(--sh1);position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue) 0%,var(--blue3) 40%,transparent 100%);
  opacity:.7;
}
.logo-wrap{display:flex;align-items:center;gap:10px;padding-right:20px;border-right:1px solid var(--border);margin-right:18px;}
.logo-icon{
  width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.2px;}
.logo-sub{font-size:10.5px;color:var(--t3);padding:2px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;}
.topbar-stats{display:flex;align-items:center;gap:3px;}
.stat{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:12.5px;color:var(--t2);cursor:default;transition:background .15s;}
.stat:hover{background:var(--bg3);}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-blue{background:var(--blue);box-shadow:0 0 0 2px var(--blue-mid);}
.dot-green{background:var(--green);box-shadow:0 0 0 2px var(--green-bg);animation:pl 2.5s infinite;}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-badge{font-size:12px;color:var(--t2);padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-family:'DM Mono',monospace;}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--t2);}
.btn-ghost:hover{background:var(--bg3);color:var(--t1);}
.btn-soft{background:var(--bg);color:var(--t1);border:1px solid var(--border2);box-shadow:var(--sh1);}
.btn-soft:hover{background:var(--bg3);}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.btn-primary:hover{background:var(--blue2);transform:translateY(-1px);}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr);}
.btn-blue:hover{background:var(--blue-mid);}

/* WORKSPACE */
.workspace{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:360px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--bg);
  overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.04);z-index:10;
}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{
  flex:1;padding:10px;font-size:12.5px;font-family:inherit;font-weight:500;
  cursor:pointer;border:none;background:transparent;color:var(--t3);
  border-bottom:2px solid transparent;transition:all .15s;
}
.stab.on{color:var(--blue);border-bottom-color:var(--blue);}
.stab:hover:not(.on){color:var(--t1);}

/* LIST TAB */
.list-view{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.sidebar-top{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.search-wrap{position:relative;}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none;}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--t1);background:var(--bg2);outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--blue);background:var(--bg);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.search-input::placeholder{color:var(--t4);}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{padding:4px 10px;border-radius:20px;font-size:11.5px;font-family:inherit;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--t2);transition:all .15s;}
.chip:hover{border-color:var(--border3);color:var(--t1);}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.list-header{padding:10px 14px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.list-label{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.list-count{font-size:11.5px;color:var(--t3);background:var(--bg3);padding:2px 8px;border-radius:20px;border:1px solid var(--border);}
.card-list{flex:1;overflow-y:auto;padding:4px 9px 9px;}
.card-list::-webkit-scrollbar{width:3px;}
.card-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}

.card{padding:11px 14px 11px 17px;border-radius:var(--r);cursor:pointer;transition:all .18s;border:1.5px solid transparent;margin-bottom:4px;position:relative;background:var(--bg);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;border-radius:4px 0 0 4px;opacity:0;transition:opacity .2s;}
.card:hover{background:var(--bg2);border-color:var(--border2);box-shadow:var(--sh1);transform:translateX(2px);}
.card:hover::before,.card.open::before{opacity:1;}
.card.open{background:var(--bg);border-color:var(--border2);box-shadow:var(--sh2);}
.era-古典::before{background:var(--yellow);}
.era-近代::before{background:var(--blue);}
.era-现代::before{background:var(--red);}
.era-治理::before{background:var(--green);}
.era-中国::before{background:var(--purple);}
.card-name{font-size:14px;font-weight:600;color:var(--t1);}
.card-who{font-size:11.5px;color:var(--t3);margin-top:2px;font-family:'DM Mono',monospace;}
.card-arr{color:var(--t3);font-size:10px;transition:transform .2s;flex-shrink:0;margin-top:3px;}
.card.open .card-arr{transform:rotate(90deg);color:var(--blue);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;}
.tag-古典{background:var(--yellow-bg);color:var(--yellow);}
.tag-近代{background:var(--blue-bg);color:var(--blue);}
.tag-现代{background:var(--red-bg);color:var(--red);}
.tag-治理{background:var(--green-bg);color:var(--green);}
.tag-中国{background:var(--purple-bg);color:var(--purple);}
.tag-new{background:var(--green-bg);color:var(--green);border:1px solid rgba(5,150,105,.2);}
.tag-gray{background:var(--bg3);color:var(--t2);border:1px solid var(--border);}
.card-detail{display:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);animation:sd .15s ease;}
.card.open .card-detail{display:block;}
@keyframes sd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dr{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.dl{font-size:10.5px;font-weight:600;color:var(--t3);width:44px;flex-shrink:0;padding-top:2px;letter-spacing:.03em;text-transform:uppercase;}
.dv{font-size:13px;color:var(--t2);line-height:1.6;flex:1;}
.card-actions{display:flex;gap:6px;margin-top:11px;}
.sidebar-foot{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1.5px dashed var(--border2);background:var(--bg);color:var(--t2);transition:all .18s;}
.add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}

/* GRAPH TAB */
.graph-view{flex:1;overflow:hidden;position:relative;background:var(--bg2);}
#graph-svg{width:100%;height:100%;}
.graph-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:8px;font-size:13px;}

/* RIGHT PANEL */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.right-top{height:44px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;background:var(--bg);box-shadow:var(--sh1);}
.model-badge{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:20px;font-size:12px;color:var(--t2);font-family:'DM Mono',monospace;}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-bg);animation:pl 2.5s infinite;}
.quick-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg);}
.ql{font-size:10.5px;color:var(--t3);font-weight:600;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase;}
.qchips{display:flex;gap:5px;flex-wrap:wrap;}
.qchip{padding:4px 12px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid var(--border2);background:var(--bg);color:var(--t2);transition:all .15s;}
.qchip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}
.msg{display:flex;gap:10px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;}
.msg.user .msg-avatar{background:var(--bg3);color:var(--t2);border:1px solid var(--border2);}
.msg-bubble{max-width:72%;padding:12px 15px;border-radius:var(--r2);font-size:13.5px;line-height:1.7;position:relative;}
.msg.assistant .msg-bubble{background:var(--bg);border:1px solid var(--border2);box-shadow:var(--sh1);color:var(--t1);border-radius:4px var(--r2) var(--r2) var(--r2);}
.msg.user .msg-bubble{background:var(--blue);color:#fff;border-radius:var(--r2) 4px var(--r2) var(--r2);}
.msg-bubble strong{cursor:pointer;background:rgba(37,99,235,.1);color:var(--blue);padding:1px 4px;border-radius:3px;transition:background .15s;}
.msg-bubble strong:hover{background:rgba(37,99,235,.2);}
.msg.user .msg-bubble strong{background:rgba(255,255,255,.2);color:#fff;}
.save-tip{font-size:11px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:4px;}

.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end;}
.chat-input{
  flex:1;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r2);
  font-size:13.5px;font-family:inherit;color:var(--t1);background:var(--bg2);
  outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5;
  transition:all .15s;
}
.chat-input:focus{border-color:var(--blue);background:var(--bg);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.chat-input::placeholder{color:var(--t4);}
.send-btn{
  width:44px;height:44px;border-radius:var(--r2);border:none;
  background:var(--blue);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;flex-shrink:0;
  box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.send-btn:hover{background:var(--blue2);transform:translateY(-1px);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.typing{display:flex;gap:5px;align-items:center;padding:8px 0;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:bounce .8s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(17,19,24,.45);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--bg);border-radius:var(--r2);border:1px solid var(--border2);box-shadow:var(--sh4);width:520px;max-width:92vw;max-height:88vh;overflow-y:auto;animation:mu .18s ease;}
@keyframes mu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:20px 22px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1;}
.modal-title{font-size:16px;font-weight:700;}
.modal-x{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-x:hover{background:var(--bg3);color:var(--t1);}
.modal-body{padding:18px 22px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;}
.fr{color:var(--red);margin-left:2px;}
.fi,.fta,.fse{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13.5px;font-family:inherit;color:var(--t1);background:var(--bg);outline:none;transition:all .15s;-webkit-appearance:none;}
.fi:focus,.fta:focus,.fse:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fi::placeholder,.fta::placeholder{color:var(--t4);}
.fta{resize:vertical;min-height:70px;line-height:1.55;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{padding:12px 22px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg);}

/* SAVE CONCEPT POPUP */
.save-popup{
  position:fixed;bottom:80px;right:20px;
  background:var(--bg);border:1.5px solid var(--border2);
  border-radius:var(--r2);box-shadow:var(--sh3);
  padding:16px;width:320px;z-index:500;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.save-popup-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.save-popup-name{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:12px;}
.save-popup-btns{display:flex;gap:8px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:var(--sh3);animation:ta 2.9s ease forwards;white-space:nowrap;pointer-events:none;}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;gap:10px;text-align:center;}
.empty-ic{font-size:28px;opacity:.25;}
.empty-tx{font-size:12.5px;color:var(--t3);line-height:1.7;}
.loading-tx{text-align:center;padding:20px;color:var(--t3);font-size:13px;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon">希</div>
      <div>
        <div class="auth-title">希言</div>
        <div class="auth-sub">政治哲学助手 · 个人知识系统</div>
      </div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" onclick="switchTab('register')">注册</button>
    </div>
    <div class="fg">
      <label class="fl">邮箱</label>
      <input class="form-input" id="authEmail" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="fg">
      <label class="fl">密码</label>
      <input class="form-input" id="authPwd" type="password" placeholder="至少6位" onkeydown="if(event.key==='Enter')doAuth()">
    </div>

<script>
// ── CONFIG ──
const SUPA_URL = 'https://rcmnynigaxjxfktlscvh.supabase.co';
const SUPA_KEY = 'sb_publishable_5FiundIlEUBkcVezEp0aUA_qqPWr1du';
const DIFY_KEY = 'app-9gDneRejjNiVbTEhSXe9NpqB';
const DIFY_API = 'https://api.dify.ai/v1';

const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ── STATE ──
let currentUser = null;
let concepts = [];
let fil = 'all';
let expIdx = null;
let authMode = 'login';
let pendingConcept = null;
let conversationId = null;
let isTyping = false;

// ── AUTH ──
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('on', (mode==='login'&&i===0)||(mode==='register'&&i===1)));
  document.getElementById('authBtn').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authMsg').innerHTML = '';
}

async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pwd = document.getElementById('authPwd').value;
  if (!email || !pwd) { showAuthMsg('请填写邮箱和密码', false); return; }
  const btn = document.getElementById('authBtn');
  btn.disabled = true; btn.textContent = '处理中…';
  try {
    let res;
    if (authMode === 'login') {
      res = await sb.auth.signInWithPassword({ email, password: pwd });
    } else {
      res = await sb.auth.signUp({ email, password: pwd });
      if (!res.error && res.data.user && !res.data.session) {
        showAuthMsg('注册成功！请检查邮箱确认链接', true);
        btn.disabled = false; btn.textContent = '注册';
        return;
      }
    }
    if (res.error) { showAuthMsg(res.error.message, false); }
    else { onLogin(res.data.user); }
  } catch(e) { showAuthMsg('网络错误，请重试', false); }
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? '登录' : '注册';
}

function showAuthMsg(msg, ok) {
  const el = document.getElementById('authMsg');
  el.className = ok ? 'auth-ok' : 'auth-err';
  el.textContent = msg;
}

async function onLogin(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  const app = document.getElementById('mainApp');
  app.style.display = 'flex';
  document.getElementById('userEmail').textContent = user.email.split('@')[0];
  await loadConcepts();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; concepts = [];
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

// ── INIT ──
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) { onLogin(data.session.user); }
  sb.auth.onAuthStateChange((_e, session) => {
    if (session && !currentUser) onLogin(session.user);
  });
})();

// ── CONCEPTS ──
async function loadConcepts() {
  const { data, error } = await sb.from('concepts').select('*').order('created_at', { ascending: false });
  if (!error) { concepts = data || []; renderCards(); updateStats(); renderGraph(); }
}

function renderCards() {
  const q = document.getElementById('si').value.toLowerCase();
  const fl = concepts.filter(c => {
    const mf = fil === 'all' || c.era === fil;
    const ms = !q || [c.name, c.thinker, c.claim, c.scene].some(s => (s||'').toLowerCase().includes(q));
    return mf && ms;
  });
  document.getElementById('vc').textContent = fl.length;
  const el = document.getElementById('cl');
  if (!fl.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ic">◈</div><div class="empty-tx">暂无匹配条目<br>点击下方按钮新增概念</div></div>`;
    return;
  }
  el.innerHTML = fl.map(c => {
    const op = expIdx === c.id;
    const ec = c.era ? `era-${c.era}` : '';
    const isNew = c.is_new;
    return `<div class="card ${op?'open':''} ${ec}" onclick="tog('${c.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div><div class="card-name">${c.name}</div><div class="card-who">${c.thinker||'—'}</div></div>
        <span class="card-arr">▶</span>
      </div>
      <div class="card-tags">
        ${c.era?`<span class="tag tag-${c.era}">${c.era}</span>`:''}
        ${isNew?'<span class="tag tag-new">↑ 今日新增</span>':''}
        ${c.scene?`<span class="tag tag-gray">${c.scene.split('、')[0]}</span>`:''}
      </div>
      <div class="card-detail">
        ${dr('主张',c.claim)}${dr('张力',c.tension)}${dr('触发',c.trigger)}${dr('场景',c.scene)}${dr('观点',c.opinion)}
        <div class="dr"><span class="dl">日期</span><span class="dv" style="color:var(--t3);font-size:12px">${new Date(c.created_at).toLocaleDateString('zh-CN')}</span></div>
        <div class="card-actions">
          <button class="btn btn-soft" style="font-size:12px;padding:4px 10px" onclick="editCard(event,'${c.id}')">编辑</button>
          <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px;color:var(--red)" onclick="delCard(event,'${c.id}')">删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function dr(l,v){return v?`<div class="dr"><span class="dl">${l}</span><span class="dv">${v}</span></div>`:'';}
function tog(id){expIdx = expIdx===id?null:id; renderCards();}
function setF(v,el){fil=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderCards();}
function updateStats(){
  document.getElementById('tc').textContent = concepts.length;
  const today = new Date().toDateString();
  document.getElementById('dc').textContent = concepts.filter(c => new Date(c.created_at).toDateString()===today).length;
}

// ── MODAL ──
function openModal(pre) {
  clrForm(); document.getElementById('ei').value = '';
  document.getElementById('mt').textContent = '新增概念条目';
  if (pre) { document.getElementById('fn').value = pre.name||''; document.getElementById('fc').value = pre.claim||''; }
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('fn').focus(), 100);
}
function editCard(e, id) {
  e.stopPropagation();
  const c = concepts.find(x=>x.id===id); if(!c) return;
  document.getElementById('ei').value = id;
  document.getElementById('mt').textContent = '编辑概念条目';
  document.getElementById('fn').value = c.name||'';
  document.getElementById('fk').value = c.thinker||'';
  document.getElementById('fc').value = c.claim||'';
  document.getElementById('ften').value = c.tension||'';
  document.getElementById('fe').value = c.era||'';
  document.getElementById('fs').value = c.scene||'';
  document.getElementById('fq').value = c.trigger||'';
  document.getElementById('fo').value = c.opinion||'';
  document.getElementById('ov').classList.add('on');
}
function closeModal(){document.getElementById('ov').classList.remove('on');}
function closeBg(e){if(e.target===document.getElementById('ov'))closeModal();}
function clrForm(){['fn','fk','fc','ften','fs','fq','fo'].forEach(id=>document.getElementById(id).value='');document.getElementById('fe').value='';}

async function saveConcept() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { toast('请填写概念名称'); return; }
  const concept = {
    user_id: currentUser.id,
    name, thinker: document.getElementById('fk').value.trim(),
    claim: document.getElementById('fc').value.trim(),
    tension: document.getElementById('ften').value.trim(),
    era: document.getElementById('fe').value,
    scene: document.getElementById('fs').value.trim(),
    trigger: document.getElementById('fq').value.trim(),
    opinion: document.getElementById('fo').value.trim(),
    is_new: true
  };
  const id = document.getElementById('ei').value;
  let res;
  if (id) { res = await sb.from('concepts').update(concept).eq('id', id); toast('✓ 概念已更新'); }
  else { res = await sb.from('concepts').insert([concept]); toast('✓ 已存入知识库'); }
  if (!res.error) { await loadConcepts(); closeModal(); renderGraph(); }
  else { toast('保存失败：' + res.error.message); }
}

async function delCard(e, id) {
  e.stopPropagation();
  if (!confirm(`确定删除该概念？`)) return;
  await sb.from('concepts').delete().eq('id', id);
  await loadConcepts(); renderGraph(); toast('已删除');
}

// ── ONE-CLICK SAVE FROM CHAT ──
function onBoldClick(text) {
  pendingConcept = text;
  document.getElementById('popupConceptName').textContent = text;
  document.getElementById('savePopup').style.display = 'block';
}
function closeSavePopup() { document.getElementById('savePopup').style.display='none'; pendingConcept=null; }
async function confirmSaveConcept() {
  if (!pendingConcept) return;
  const { error } = await sb.from('concepts').insert([{
    user_id: currentUser.id, name: pendingConcept, is_new: true
  }]);
  if (!error) { await loadConcepts(); renderGraph(); toast(`✓「${pendingConcept}」已存入知识库`); }
  closeSavePopup();
}

// ── CHAT ──
function renderMsg(role, content) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'assistant' ? '希' : (currentUser?.email?.[0]?.toUpperCase()||'U');

  let html = content;
  if (role === 'assistant') {
    // 加粗文字变为可点击存入知识库
    html = content.replace(/\*\*(.*?)\*\*/g, (_, t) =>
      `<strong onclick="onBoldClick('${t.replace(/'/g,"&#39;")}')" title="点击存入知识库">${t}</strong>`
    );
    // 标题格式
    html = html.replace(/^#{1,3}\s+(.+)$/gm, '<b>$1</b>');
    html = html.replace(/\n/g, '<br>');
  }

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${html}</div>
      ${role==='assistant'?'<div class="save-tip">💡 点击加粗文字可一键存入知识库</div>':''}
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">希</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}
function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim(); if (!text || isTyping) return;
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = ''; input.style.height = 'auto';

  renderMsg('user', text);

  // 保存到数据库
  await sb.from('conversations').insert([{ user_id: currentUser.id, role: 'user', content: text }]);

  showTyping();

  try {
    const body = {
      inputs: {},
      query: text,
      response_mode: 'streaming',
      user: currentUser.id,
    };
    if (conversationId) body.conversation_id = conversationId;

    const res = await fetch(`${DIFY_API}/chat-messages`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${DIFY_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json();
      renderMsg('assistant', `抱歉，发生错误：${err.message||res.status}`);
      isTyping = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    // 流式输出
    const msgDiv = renderMsg('assistant', '');
    const bubble = msgDiv.querySelector('.msg-bubble');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.event === 'message') {
            fullText += data.answer;
            let html = fullText.replace(/\*\*(.*?)\*\*/g, (_, t) =>
              `<strong onclick="onBoldClick('${t.replace(/'/g,"&#39;")}')" title="点击存入知识库">${t}</strong>`
            ).replace(/^#{1,3}\s+(.+)$/gm,'<b>$1</b>').replace(/\n/g,'<br>');
            bubble.innerHTML = html;
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
          }
          if (data.event === 'message_end') {
            conversationId = data.conversation_id;
            await sb.from('conversations').insert([{ user_id: currentUser.id, role: 'assistant', content: fullText }]);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    hideTyping();
    renderMsg('assistant', '网络错误，请检查连接后重试。');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function injectPrompt(text) { const i=document.getElementById('chatInput'); i.value=text; i.focus(); autoResize(i); }
function clearChat() {
  if (!confirm('清空当前对话？')) return;
  document.getElementById('chatArea').innerHTML = '';
  conversationId = null;
  renderMsg('assistant', '对话已重置，请继续提问。');
}

function switchSideTab(tab, el) {
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on')); el.classList.add('on');
  document.getElementById('listView').style.display = tab==='list'?'flex':'none';
  document.getElementById('graphView').style.display = tab==='graph'?'block':'none';

// ── KNOWLEDGE GRAPH ──
function renderGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  if (concepts.length < 2) {
    document.getElementById('graphEmpty').style.display = 'flex'; return;
  }
  document.getElementById('graphEmpty').style.display = 'none';

  const w = document.getElementById('graphView').clientWidth || 360;
  const h = document.getElementById('graphView').clientHeight || 400;
  svg.attr('width', w).attr('height', h);

  const nodes = concepts.map(c => ({ id: c.id, name: c.name, era: c.era }));
  const links = [];

  // 连线：有对立关系的找匹配
  concepts.forEach(c => {
    if (c.tension) {
      concepts.forEach(d => {
        if (c.id !== d.id && c.tension.includes(d.name)) {
          links.push({ source: c.id, target: d.id, type: 'tension' });
        }
      });
    }
    // 同时代连线
    concepts.forEach(d => {
      if (c.id < d.id && c.era && c.era === d.era) {
        links.push({ source: c.id, target: d.id, type: 'era' });
      }
    });
  });

  const colorMap = { '古典':'#d97706','近代':'#2563eb','现代':'#dc2626','治理':'#059669','中国':'#7c3aed' };

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collision', d3.forceCollide(40));

  const link = svg.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', d => d.type==='tension' ? '#dc2626' : '#d4d8de')
    .attr('stroke-width', d => d.type==='tension' ? 2 : 1)
    .attr('stroke-dasharray', d => d.type==='tension' ? '5,3' : 'none')
    .attr('opacity', .6);

  const node = svg.append('g').selectAll('g').data(nodes).join('g')
    .attr('cursor','pointer')
    .on('click', (_,d) => { expIdx=d.id; switchSideTab('list',document.querySelectorAll('.stab')[0]); renderCards(); })
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

  node.append('circle').attr('r',24).attr('fill', d=>colorMap[d.era]||'#8892a0').attr('opacity',.85).attr('stroke','#fff').attr('stroke-width',2);
  node.append('text').text(d=>d.name.slice(0,4)).attr('text-anchor','middle').attr('dominant-baseline','central').attr('fill','#fff').attr('font-size','11px').attr('font-weight','600').attr('pointer-events','none');

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${Math.max(28,Math.min(w-28,d.x))},${Math.max(28,Math.min(h-28,d.y))})`);
  });
}

// ── EXPORT ──
function exportData() {
  const tx = concepts.map(c=>[`# ${c.name}`,`思想家：${c.thinker||'—'}`,`核心主张：${c.claim||'—'}`,`对立关系：${c.tension||'—'}`,`时代：${c.era||'—'}`,`应用场景：${c.scene||'—'}`,c.trigger?`触发问题：${c.trigger}`:'',c.opinion?`我的观点：${c.opinion}`:'',`录入日期：${new Date(c.created_at).toLocaleDateString('zh-CN')}`].filter(Boolean).join('\n')).join('\n\n---\n\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([tx],{type:'text/plain;charset=utf-8'}));
  a.download = `希言知识地图_${new Date().toLocaleDateString('zh-CN')}.txt`;
  a.click(); toast('✓ 导出成功');
}

// ── TOAST ──
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
